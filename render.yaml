databases:
  - name: notes-app-db
    plan: free
    databaseName: notes_app

services:
  - type: web
    name: notes-app
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: notes-app-db
          property: connectionString
